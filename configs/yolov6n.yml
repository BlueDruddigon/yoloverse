# YOLOv6-N model
model:
  type: YOLOv6n
  pretrained: None
  depth_multiple: 0.33
  width_multiple: 0.25
  backbone:
    type: EfficientRep
    num_repeats: [1, 6, 12, 18, 6]
    out_channels: [64, 128, 256, 512, 1024]
    fuse_p2: True
    cspsppf: True
  neck:
    type: RepPANNeck
    num_repeats: [12, 12, 12, 12]
    out_channels: [256, 128, 128, 256, 256, 512]
